name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing git tag to build and release"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-26
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Import Code Signing Certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${MACOS_CERT_P12_BASE64}" ]; then
            echo "MACOS_CERT_P12_BASE64 is not set. Skipping code signing."
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "${MACOS_CERT_P12_BASE64}" | base64 --decode > "${CERT_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -k "${KEYCHAIN_PATH}" -P "${MACOS_CERT_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          # Grant codesign non-interactive access to the imported private key
          # (without this, signing on a headless runner fails with errSecInternalComponent).
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          # Keep the login keychain in the search list so the default keychain still works.
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Build Release App
        run: |
          VERSION="${RELEASE_TAG#v}"
          xcodebuild \
            -project BLEUnlock.xcodeproj \
            -scheme BLEUnlock \
            -configuration Release \
            -derivedDataPath build \
            MARKETING_VERSION="${VERSION}" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Code Sign App
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          APP_PATH="build/Build/Products/Release/BLEUnlock.app"
          if [ -z "${MACOS_SIGNING_IDENTITY}" ]; then
            echo "MACOS_SIGNING_IDENTITY is not set. Ad-hoc signing instead."
            /usr/bin/codesign --force --deep --sign - "${APP_PATH}"
            exit 0
          fi

          ENTITLEMENTS_PATH="BLEUnlock/BLEUnlock.entitlements"
          # Sign inside-out (nested helper first, then the outer app) rather than --deep,
          # which is unreliable for embedded sub-apps. No --options runtime (hardened
          # runtime): its Library Validation would block the private login.framework this
          # app loads, and there is no notarization to require it.
          LAUNCHER_PATH="${APP_PATH}/Contents/Library/LoginItems/Launcher.app"
          if [ -d "${LAUNCHER_PATH}" ]; then
            /usr/bin/codesign --force --sign "${MACOS_SIGNING_IDENTITY}" "${LAUNCHER_PATH}"
          fi
          /usr/bin/codesign --force --entitlements "${ENTITLEMENTS_PATH}" --sign "${MACOS_SIGNING_IDENTITY}" "${APP_PATH}"
          # Fail the build if the signature or designated requirement is wrong.
          /usr/bin/codesign --verify --strict --verbose=2 "${APP_PATH}"
          echo "Designated requirement:"
          /usr/bin/codesign -d -r- "${APP_PATH}" 2>&1 | grep -i designated || true

      - name: Install create-dmg
        run: |
          npm install -g create-dmg

      - name: Package DMG
        run: |
          APP_PATH="build/Build/Products/Release/BLEUnlock.app"
          DEST_DIR="build/Build/Products/Release"
          create-dmg \
            --overwrite \
            --no-code-sign \
            --no-version-in-filename \
            "${APP_PATH}" \
            "${DEST_DIR}"
          mv "${DEST_DIR}/BLEUnlock.dmg" "${DEST_DIR}/BLEUnlock-${RELEASE_TAG}.dmg"
          /usr/bin/ditto -c -k --keepParent "${APP_PATH}" "${DEST_DIR}/BLEUnlock-${RELEASE_TAG}.zip"


      - name: Merge Changelog
        run: |
          python3 << 'MERGE_EOF'
          import re

          def parse_blocks(text):
              blocks = re.split(r'\n(?=## \d)', text)
              result = {}
              for block in blocks[1:]:
                  m = re.match(r'(## [\d.]+)\n(.*)', block, re.DOTALL)
                  if m:
                      body = m.group(2).strip()
                      if body:
                          result[m.group(1)] = body
              return result

          with open('CHANGELOG.md') as f: en = parse_blocks(f.read())
          with open('CHANGELOG.cn.md') as f: cn = parse_blocks(f.read())
          with open('CHANGELOG.ja.md') as f: ja = parse_blocks(f.read())

          versions = list(en.keys())

          with open('CHANGELOG.md', 'w') as f:
              f.write('# Release Notes\n\n')
              for ver in versions:
                  f.write(f'{ver}\n\n')
                  f.write(en.get(ver, '') + '\n')
                  cn_body = cn.get(ver, '')
                  if cn_body:
                      f.write(f'\n<details>\n<summary>中文发布说明</summary>\n\n')
                      f.write(cn_body + '\n')
                      f.write('</details>\n')
                  ja_body = ja.get(ver, '')
                  if ja_body:
                      f.write(f'\n<details>\n<summary>日本語リリースノート</summary>\n\n')
                      f.write(ja_body + '\n')
                      f.write('</details>\n')
                  f.write('\n')
          MERGE_EOF

      - name: Create or Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG_PATH="build/Build/Products/Release/BLEUnlock-${RELEASE_TAG}.dmg"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${DMG_PATH}" "build/Build/Products/Release/BLEUnlock-${RELEASE_TAG}.zip" --clobber
            gh release edit "${RELEASE_TAG}" --title "${RELEASE_TAG}" --notes-file <(awk "/^## ${RELEASE_TAG#v}/{found=1; next} /^## /{found=0; exit} found" CHANGELOG.md)
          else
            gh release create "${RELEASE_TAG}" \
              "${DMG_PATH}" \
              "build/Build/Products/Release/BLEUnlock-${RELEASE_TAG}.zip" \
              --title "${RELEASE_TAG}" \
              --notes-file <(awk "/^## ${RELEASE_TAG#v}/{found=1; next} /^## /{found=0; exit} found" CHANGELOG.md)
          fi
