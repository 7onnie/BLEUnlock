name: CI

on:
  push:
    branches:
      - master
    tags-ignore:
      - "*"

jobs:
  build:

    runs-on: macOS-latest
    
    steps:
    - uses: actions/checkout@master
    - name: Run swiftc test suites
      run: |
        swiftc -o /tmp/rssidecision-tests Tests/RSSIDecisionTests/main.swift BLEUnlock/RSSIDecision.swift && /tmp/rssidecision-tests
        swiftc -o /tmp/gateway-tests Tests/GatewayParsingTests/main.swift BLEUnlock/GatewayParsing.swift && /tmp/gateway-tests
        swiftc -o /tmp/updateassets-tests Tests/UpdateAssetsTests/main.swift BLEUnlock/UpdateAssets.swift && /tmp/updateassets-tests
        swiftc -o /tmp/permreport-tests Tests/PermissionReportTests/main.swift BLEUnlock/PermissionReport.swift && /tmp/permreport-tests
    - name: Start xcodebuild test
      run: xcodebuild clean build -project BLEUnlock.xcodeproj -scheme BLEUnlock CODE_SIGNING_ALLOWED=NO
